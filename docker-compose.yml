services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retrowave-frontend
    restart: unless-stopped
    ports:
      - '3015:3000'
    environment:
      - NODE_ENV=production
      - API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - retrowave-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retrowave-backend
    restart: unless-stopped
    ports:
      - '3016:3001'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://retrowave:retrowave_pass@db:5432/retrowave
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - retrowave-net

  db:
    image: postgres:16-alpine
    container_name: retrowave-db
    restart: unless-stopped
    expose:
      - '5432'
    environment:
      POSTGRES_USER: retrowave
      POSTGRES_PASSWORD: retrowave_pass
      POSTGRES_DB: retrowave
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U retrowave']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retrowave-net

  redis:
    image: redis:7-alpine
    container_name: retrowave-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - retrowave-net



volumes:
  postgres-data:
  redis-data:

networks:
  retrowave-net:
    driver: bridge
